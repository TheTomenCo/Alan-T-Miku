<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Hybrid String-Organ Instrument</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex: 1;
        }

        /* Left: strings */
        #strings {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: stretch;
            padding: 20px;
            border-right: 2px solid #333;
            background: radial-gradient(circle at top left, #333, #000);
        }

        .string {
            height: 16px;
            border-radius: 2px;
            background: linear-gradient(90deg, #777, #ccc, #777);
            position: relative;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .string.active {
            transform: scaleY(2);
            box-shadow: 0 0 10px #0ff;
        }

        /* Right: 2-layer piano */
        #keyboard {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: radial-gradient(circle at top right, #333, #000);
        }

        .layer-label {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .layer {
            flex: 1;
            display: flex;
            align-items: flex-end;
            margin-bottom: 10px;
            position: relative;
        }

        .white-key {
            flex: 1;
            height: 100%;
            margin: 0 1px;
            background: #f5f5f5;
            border-radius: 4px;
            border: 1px solid #555;
            position: relative;
            box-sizing: border-box;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 12px;
            color: #222;
            user-select: none;
            transition: background 0.05s, transform 0.05s, box-shadow 0.05s;
        }

        .white-key.active {
            background: #ffd27f;
            box-shadow: 0 0 10px #ffa500;
            transform: translateY(2px);
        }

        .black-key {
            position: absolute;
            width: 60%;
            height: 60%;
            background: #222;
            border-radius: 4px;
            border: 1px solid #555;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 10px;
            color: #eee;
            user-select: none;
            transition: background 0.05s, transform 0.05s, box-shadow 0.05s;
            cursor: pointer;
        }

        .black-key.active {
            background: #555;
            box-shadow: 0 0 10px #0ff;
            transform: translateX(-50%) translateY(2px);
        }

        #info {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #aaa;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="container">
    <div id="strings"></div>
    <div id="keyboard">
        <div class="layer-label">Upper layer (octave 2)</div>
        <div class="layer" id="layer2"></div>
        <div class="layer-label">Lower layer (octave 1)</div>
        <div class="layer" id="layer1"></div>
    </div>
</div>
<div id="info">
    Hold a note with your laptop keyboard (A W S E D F T G Y H U J) and strum the strings with your mouse.
</div>

<script>
    // -----------------------------
    // Audio setup
    // -----------------------------
    let audioCtx = null;

    function getAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }

    function midiToFreq(midi) {
        return 440 * Math.pow(2, (midi - 69) / 12);
    }

    // Simple pluck-like envelope
    function playPluck(freq) {
        const ctx = getAudioContext();
        const now = ctx.currentTime;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "triangle";
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.8, now + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.7);
    }

    // -----------------------------
    // Keyboard mapping
    // -----------------------------
    // We'll map typical QWERTY keys to a 2-octave C-major-ish layout:
    // Lower octave: A W S E D F T G Y H U J
    // Upper octave: same keys but mapped to next octave
    //
    // We'll treat:
    //   layer1 = octave 4 (C4–B4)
    //   layer2 = octave 5 (C5–B5)
    //
    // White keys: C D E F G A B
    // Black keys: C# D# F# G# A#
    //
    // We'll use only one mapping for physical keys, but visually show both layers.

    const keyToSemitone = {
        // lower row (white + black)
        "a": 0,   // C
        "w": 1,   // C#
        "s": 2,   // D
        "e": 3,   // D#
        "d": 4,   // E
        "f": 5,   // F
        "t": 6,   // F#
        "g": 7,   // G
        "y": 8,   // G#
        "h": 9,   // A
        "u": 10,  // A#
        "j": 11   // B
    };

    const baseMidiLower = 60; // C4
    const baseMidiUpper = 72; // C5

    let heldNote = null; // { midi, freq, name }
    let heldKey = null;

    function semitoneToName(semi) {
        const names = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        return names[semi % 12];
    }

    function updateHeldNoteDisplay() {
        const info = document.getElementById("info");
        if (heldNote) {
            info.textContent =
                `Held note: ${heldNote.name} (MIDI ${heldNote.midi}) – strum the strings with your mouse.`;
        } else {
            info.textContent =
                "Hold a note with your laptop keyboard (A W S E D F T G Y H U J) and strum the strings with your mouse.";
        }
    }

    // -----------------------------
    // Build keyboard UI
    // -----------------------------
    const whiteOrder = ["C", "D", "E", "F", "G", "A", "B"];
    const blackOffsets = {
        "C": "C#",
        "D": "D#",
        "F": "F#",
        "G": "G#",
        "A": "A#"
    };

    function buildLayer(containerId, baseMidi) {
        const layer = document.getElementById(containerId);
        layer.innerHTML = "";

        const whiteWidthCount = whiteOrder.length;

        whiteOrder.forEach((noteName, i) => {
            const semi = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"].indexOf(noteName);
            const midi = baseMidi + semi;

            const whiteKey = document.createElement("div");
            whiteKey.className = "white-key";
            whiteKey.dataset.midi = midi;
            whiteKey.dataset.note = noteName;

            whiteKey.textContent = noteName;

            whiteKey.addEventListener("mousedown", () => {
                const freq = midiToFreq(midi);
                heldNote = { midi, freq, name: noteName };
                heldKey = null; // mouse override
                highlightKeys();
                updateHeldNoteDisplay();
            });

            layer.appendChild(whiteKey);

            // Add black key if exists after this white key
            const blackName = blackOffsets[noteName];
            if (blackName) {
                const semiBlack = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"].indexOf(blackName);
                const midiBlack = baseMidi + semiBlack;

                const blackKey = document.createElement("div");
                blackKey.className = "black-key";
                blackKey.style.top = Math.floor(1 + Math.random() * 30) + "%";
                blackKey.style.left = Math.floor(30 + Math.random() * 30) + "%";
                blackKey.dataset.midi = midiBlack;
                blackKey.dataset.note = blackName;
                blackKey.textContent = blackName;

                blackKey.addEventListener("mousedown", (e) => {
                    e.stopPropagation();
                    const freq = midiToFreq(midiBlack);
                    heldNote = { midi: midiBlack, freq, name: blackName };
                    heldKey = null;
                    highlightKeys();
                    updateHeldNoteDisplay();
                });

                whiteKey.appendChild(blackKey);
            }
        });
    }

    function highlightKeys() {
        const allKeys = document.querySelectorAll(".white-key, .black-key");
        allKeys.forEach(k => k.classList.remove("active"));
        if (!heldNote) return;
        allKeys.forEach(k => {
            if (Number(k.dataset.midi) === heldNote.midi) {
                k.classList.add("active");
            }
        });
    }

    // -----------------------------
    // Build strings UI
    // -----------------------------
    function buildStrings() {
        const stringsContainer = document.getElementById("strings");
        stringsContainer.innerHTML = "";
        const stringCount = 5;

        for (let i = 0; i < stringCount; i++) {
            const s = document.createElement("div");
            s.className = "string";
            s.dataset.index = i;

            const pluck = () => {
                if (!heldNote) return;
                s.classList.add("active");
                playPluck(heldNote.freq);
                setTimeout(() => s.classList.remove("active"), 80);
            };

            s.addEventListener("mousedown", pluck);
            s.addEventListener("mouseenter", (e) => {
                if (e.buttons === 1) pluck(); // drag-strum with left mouse button
            });

            stringsContainer.appendChild(s);
        }
    }

    // -----------------------------
    // Keyboard events
    // -----------------------------
    window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (!keyToSemitone.hasOwnProperty(key)) return;
        if (heldKey === key) return; // already held

        const semi = keyToSemitone[key];

        // Decide which octave: use lower by default, shift for upper
        const useUpper = e.shiftKey;
        const baseMidi = useUpper ? baseMidiUpper : baseMidiLower;
        const midi = baseMidi + semi;
        const freq = midiToFreq(midi);
        const name = semitoneToName(semi) + (useUpper ? " (upper)" : " (lower)");

        heldNote = { midi, freq, name };
        heldKey = key;
        highlightKeys();
        updateHeldNoteDisplay();
    });

    window.addEventListener("keyup", (e) => {
        const key = e.key.toLowerCase();
        if (key === heldKey) {
            heldKey = null;
            heldNote = null;
            highlightKeys();
            updateHeldNoteDisplay();
        }
    });

    // -----------------------------
    // Init
    // -----------------------------
    buildLayer("layer1", baseMidiLower);
    buildLayer("layer2", baseMidiUpper);
    buildStrings();
    updateHeldNoteDisplay();
</script>
</body>
</html>
